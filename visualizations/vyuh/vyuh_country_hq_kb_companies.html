                        "id": "conn_entity_magneti_marelli_hyperedge_country_Unknown",
                        "source": "entity_magneti_marelli",
                        "target": "hyperedge_country_Unknown",
                        "type": "company_to_country",
                        "data": {
                                "description": "Magneti Marelli HQ in Unknown",
                                "color": "#C0C0C0",
                                "width": 2
                        }
                },
                {
                        "id": "conn_entity_magna_seating_hyperedge_country_Unknown",
                        "source": "entity_magna_seating",
                        "target": "hyperedge_country_Unknown",
                        "type": "company_to_country",
                        "data": {
                                "description": "Magna Seating HQ in Unknown",
                                "color": "#C0C0C0",
                                "width": 2
                        }
                }
        ],
        "metadata": {
                "total_companies": 216,
                "total_countries": 13,
                "total_continents": 4,
                "generated_at": "2026-03-14T15:13:50.769734"
        }
};
        
        // Convert to vis-network format
        const nodes = new vis.DataSet(
            vyuhData.nodes.map(node => {
                const isHyperedge = node.data.is_hyperedge || false;
                const nodeName = node.data.name || node.id;
                
                // For country hyperedges, show flag emoji + country name and count
                let displayLabel = nodeName;
                let shape = 'dot';
                let size = 20;
                
                if (isHyperedge && node.data.company_count) {
                    const flag = node.data.flag || '🌍';
                    displayLabel = `${flag} ${nodeName}\n(${node.data.company_count} companies)`;
                    // Use star shape for country hyperedges to make them stand out
                    shape = 'star';
                    size = 50;
                }
                
                return {
                    id: node.id,
                    label: displayLabel,
                    shape: shape,
                    size: size,
                    color: {
                        background: node.data.color || '#757575',
                        border: node.data.color || '#757575',
                        highlight: {
                            background: node.data.color || '#757575',
                            border: '#000000'
                        }
                    },
                    font: {
                        size: isHyperedge ? 20 : 12,
                        bold: isHyperedge,
                        color: '#000000',
                        face: 'Arial',
                        strokeWidth: 3,
                        strokeColor: '#FFFFFF'
                    },
                    title: `${node.data.name || node.id}\nType: ${node.data.type}\nCountry: ${node.data.country || 'N/A'}\nContexts: ${node.data.contexts || 0}\n${JSON.stringify(node.data, null, 2)}`,
                    x: node.position.x,
                    y: node.position.y,
                    fixed: false
                };
            })
        );
        
        const edges = new vis.DataSet(
            vyuhData.connections.map(conn => {
                return {
                    id: conn.id,
                    from: conn.source,
                    to: conn.target,
                    color: {
                        color: conn.data.color || '#BDBDBD',
                        highlight: conn.data.color || '#BDBDBD'
                    },
                    width: conn.data.width || 2,
                    dashes: conn.data.dashed || false,
                    title: conn.data.description || '',
                    smooth: {
                        type: 'continuous',
                        roundness: 0.5
                    }
                };
            })
        );
        
        const container = document.getElementById('graph-container');
        const data = { nodes: nodes, edges: edges };
        const options = {
            nodes: {
                borderWidth: 3,
                shadow: {
                    enabled: true,
                    size: 10,
                    x: 2,
                    y: 2
                },
                font: {
                    size: 12,
                    face: 'Arial',
                    color: '#000000',
                    strokeWidth: 3,
                    strokeColor: '#FFFFFF',
                    align: 'center'
                },
                labelHighlightBold: true,
                chosen: {
                    node: function(values, id, selected, hovering) {
                        values.size = values.size + 5;
                        values.font.size = values.font.size + 2;
                    }
                }
            },
            edges: {
                arrows: {
                    to: {
                        enabled: false
                    }
                },
                smooth: {
                    type: 'continuous'
                }
            },
            physics: {
                enabled: true,
                stabilization: {
                    iterations: 200
                },
                barnesHut: {
                    gravitationalConstant: -2000,
                    centralGravity: 0.1,
                    springLength: 200,
                    springConstant: 0.04,
                    damping: 0.09
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true,
                dragView: true
            }
        };
        
        const network = new vis.Network(container, data, options);
        
        // Add click handler
        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const node = nodes.get(nodeId);
                console.log('Clicked node:', node);
            }
        });
    </script>
