<head>
    <meta charset="utf-8">

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sidebar: 240px;
            --header: 54px;
            --border: #e8e8e8;
            --bg: #f7f8fa;
            --white: #fff;
            --text: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top Header ── */
        .top-header {
            height: var(--header);
            background: #111827;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 14px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .hdr-logo {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }
        .hdr-divider {
            width: 1px;
            height: 22px;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .hdr-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
        }
        .hdr-stats {
            display: flex;
            gap: 20px;
            margin-left: 8px;
        }
        .hdr-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .hdr-stat-val {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .hdr-stat-lbl {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .hdr-controls {
            margin-left: auto;
            display: flex;
            gap: 7px;
            align-items: center;
        }
        .hdr-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .hdr-btn:hover {
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.3);
        }
        .physics-btn-on {
            background: rgba(16,185,129,0.15);
            border-color: rgba(16,185,129,0.45);
            color: #6ee7b7;
        }
        .physics-btn-on:hover { background: rgba(16,185,129,0.25); }
        .physics-btn-off {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.38);
            color: #fca5a5;
        }
        .physics-btn-off:hover { background: rgba(239,68,68,0.2); }

        /* ── Main Layout ── */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar);
            min-width: var(--sidebar);
            height: 100%;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Search */
        .search-box {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background: var(--bg);
            font-family: inherit;
            transition: border-color 0.15s, background 0.15s;
        }
        .search-box input:focus {
            border-color: #aaa;
            background: var(--white);
        }
        .search-box input::placeholder { color: #c0c0c0; }

        /* Tier Filters */
        .filter-section {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }
        .section-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bbb;
            margin-bottom: 10px;
        }
        .tier-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 5px;
            cursor: pointer;
            border-radius: 5px;
            user-select: none;
            transition: background 0.1s;
        }
        .tier-filter:hover { background: #f5f5f5; }
        .tier-filter input[type="checkbox"] { display: none; }
        .tier-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tier-label {
            flex: 1;
            font-size: 12px;
            color: #444;
            line-height: 1.3;
        }
        .tier-count {
            font-size: 11px;
            color: #bbb;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            min-width: 22px;
            text-align: right;
        }
        .tier-filter.disabled .tier-dot { opacity: 0.2; }
        .tier-filter.disabled .tier-label { color: #ccc; text-decoration: line-through; }
        .tier-filter.disabled .tier-count { color: #ddd; }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: #ccc;
            text-align: center;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        /* ── Graph Area ── */
        .graph-area {
            flex: 1;
            position: relative;
            background: var(--bg);
        }
        #graph-container {
            width: 100%;
            height: 100%;
            background: #fafafa;
        }

        /* ── Detail Panel ── */
        .detail-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 270px;
            background: var(--white);
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 16px;
            display: none;
            z-index: 10;
        }
        .detail-panel.visible { display: block; }
        .detail-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #bbb;
            padding: 2px 4px;
            line-height: 1;
            width: auto;
            margin: 0;
        }
        .detail-panel .close-btn:hover { color: #333; }
        .detail-name {
            font-size: 15px;
            font-weight: 700;
            color: #111;
            margin-bottom: 8px;
            padding-right: 24px;
            line-height: 1.3;
        }
        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }
        .detail-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .detail-stat {
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
        }
        .detail-stat .value {
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }
        .detail-stat .label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Search results dropdown */
        .search-results {
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #f0f0f0;
            margin-top: 6px;
            display: none;
        }
        .search-results.visible { display: block; }
        .search-result-item {
            padding: 6px 4px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 4px;
        }
        .search-result-item:hover { background: #f5f5f5; }
        .search-result-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Mode Toggle ── */
        .mode-toggle {
            display: flex;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 7px;
            overflow: hidden;
        }
        .mode-btn {
            padding: 6px 14px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }
        .mode-btn.active { background: rgba(255,255,255,0.16); color: #fff; }
        .mode-btn + .mode-btn { border-left: 1px solid rgba(255,255,255,0.18); }
    </style>
</head>
<body>
    <!-- Top Header -->
    <div class="top-header">
        <span class="hdr-logo">GoCarbonTracker</span>
        <div class="hdr-divider"></div>
        <span class="hdr-subtitle">Automotive Supply Chain · Tier &amp; Country Map</span>
        <div class="hdr-stats">
            <div class="hdr-stat">
                <span class="hdr-stat-val" id="companyCount">0</span>
                <span class="hdr-stat-lbl">Companies</span>
            </div>
            <div class="hdr-stat">
                <span class="hdr-stat-val" id="connectionCount">0</span>
                <span class="hdr-stat-lbl">Connections</span>
            </div>
            <div class="hdr-stat">
                <span class="hdr-stat-val" id="countryCount">0</span>
                <span class="hdr-stat-lbl">Countries</span>
            </div>
            <div class="hdr-stat">
                <span class="hdr-stat-val" id="tierCount">0</span>
                <span class="hdr-stat-lbl">Tiers</span>
            </div>
        </div>
        <div class="hdr-controls">
            <div class="mode-toggle">
                <button class="mode-btn active" id="tierModeBtn" onclick="switchMode('tier')">By Tier</button>
                <button class="mode-btn" id="countryModeBtn" onclick="switchMode('country')">By Country</button>
            </div>
            <button class="hdr-btn" onclick="fitGraph()">Fit to View</button>
            <button class="hdr-btn" onclick="resetFilters()">Reset Filters</button>
            <button class="hdr-btn physics-btn-on" onclick="togglePhysics()" id="physicsBtn">⚡ Physics: On</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-layout">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search companies..." />
                <div class="search-results" id="searchResults"></div>
            </div>

            <div class="filter-section">
                <div class="section-label">Filter by Tier</div>
                <div id="tierFilters"></div>
            </div>

            <div class="sidebar-footer">GoCarbonTracker · Proof of Concept</div>
        </div>

        <div class="graph-area">
            <div id="graph-container"></div>
            <div class="detail-panel" id="detailPanel">
                <button class="close-btn" onclick="closeDetail()">&times;</button>
                <div class="detail-name" id="detailName"></div>
                <div class="detail-meta" id="detailMeta"></div>
                <div class="detail-stats" id="detailStats"></div>
            </div>
        </div>
    </div>

                        "data": {
                                "color": "#AD1457",
                                "width": 1,
                                "dashed": false
                        }
                },
                {
                        "id": "conn_entity_gm-financial_hyperedge_country_United_States",
                        "source": "entity_gm-financial",
                        "target": "hyperedge_country_United_States",
                        "type": "company_to_country",
                        "data": {
                                "color": "#37474F",
                                "width": 1,
                                "dashed": false
                        }
                }
        ],
        "metadata": {
                "total_companies": 241,
                "total_tiers": 12,
                "total_countries": 26,
                "total_continents": 4,
                "generated_at": "2026-01-19T19:12:28.462599"
        }
};

        // Tier config — full descriptive names for all tiers
        const tierConfig = {
            0:   { name: 'Tier 0 · OEM Manufacturers',       color: '#EF5350' },
            1:   { name: 'Tier 1 · Systems Suppliers',        color: '#FF9800' },
            2:   { name: 'Tier 2 · Component Suppliers',      color: '#4CAF50' },
            2.5: { name: 'Tier 2.5 · Battery Cells',          color: '#8BC34A' },
            3:   { name: 'Tier 3 · Sub-Component Mfg',        color: '#2196F3' },
            4:   { name: 'Tier 4 · Specialty Parts',          color: '#9C27B0' },
            5:   { name: 'Tier 5 · Processed Materials',      color: '#E91E63' },
            6:   { name: 'Tier 6 · Chemicals & Compounds',    color: '#00BCD4' },
            7:   { name: 'Tier 7 · Raw Materials',            color: '#FF5722' },
            8:   { name: 'Tier 8 · Mining & Extraction',      color: '#795548' },
            'insurance':  { name: 'Insurance Services',       color: '#546E7A' },
            'financial':  { name: 'Financial Services',       color: '#455A64' },
        };

        // Track state — include special string-keyed tiers
        let activeTiers = new Set(Object.keys(tierConfig).map(k => isNaN(k) ? k : Number(k)));
        let network = null;
        let allNodes = [];
        let allEdges = [];
        let physicsEnabled = true;
        let currentMode = 'tier'; // 'tier' | 'country'

        // Parse data
        const companyNodes = vyuhData.nodes.filter(n => n.type === 'company');

        // Count stats dynamically
        const companies = companyNodes;
        const uniqueCountries = new Set(companies.map(c => c.data.country).filter(c => c && c !== 'Unknown'));
        const uniqueTiers = new Set(companies.map(c => c.data.tier));
        const tierCounts = {};
        companies.forEach(c => {
            const t = c.data.tier;
            if (t !== undefined) tierCounts[t] = (tierCounts[t] || 0) + 1;
        });

        // Update header stats
        document.getElementById('companyCount').textContent = companies.length;
        document.getElementById('connectionCount').textContent = vyuhData.connections.length;
        document.getElementById('countryCount').textContent = uniqueCountries.size;
        document.getElementById('tierCount').textContent = uniqueTiers.size;

        // Build tier filters — handle numeric, float, and string tier keys
        const filterContainer = document.getElementById('tierFilters');
        Object.keys(tierConfig)
            .sort((a, b) => { const na = parseFloat(a), nb = parseFloat(b); return isNaN(na) ? 1 : isNaN(nb) ? -1 : na - nb; })
            .forEach(tierKey => {
                const t = isNaN(tierKey) ? tierKey : Number(tierKey);
                const count = tierCounts[t] || 0;
                if (count === 0) return;
                const div = document.createElement('div');
                div.className = 'tier-filter';
                div.dataset.tier = tierKey;
                div.innerHTML = `
                    <input type="checkbox" checked>
                    <span class="tier-dot" style="background: ${tierConfig[tierKey].color}"></span>
                    <span class="tier-label">${tierConfig[tierKey].name}</span>
                    <span class="tier-count">${count}</span>
                `;
                div.addEventListener('click', () => toggleTier(t, div));
                filterContainer.appendChild(div);
            });

        // Build vis-network
        function buildGraph() {
            const isTierMode = currentMode === 'tier';

            allNodes = vyuhData.nodes
                .filter(node => {
                    // Always hide continent hyperedges
                    if (node.data.type === 'continent_hyperedge') return false;
                    if (node.id && node.id.startsWith('hyperedge_continent_')) return false;

                    if (isTierMode) {
                        // Tier mode: hide country hyperedges
                        if (node.data.type === 'country_hyperedge') return false;
                        if (node.id && node.id.startsWith('hyperedge_country_')) return false;
                        if (node.data.is_hyperedge && node.data.type === 'tier_hyperedge') {
                            return activeTiers.has(node.data.tier);
                        }
                        return node.data.tier === undefined || activeTiers.has(node.data.tier);
                    } else {
                        // Country mode: hide tier hyperedges, show named country hyperedges
                        if (node.data.type === 'tier_hyperedge') return false;
                        if (node.id && node.id.startsWith('hyperedge_tier_')) return false;
                        // Show named country hubs but NOT the "Unknown" blob
                        if (node.data.type === 'country_hyperedge') {
                            return node.id !== 'hyperedge_country_Unknown';
                        }
                        // All company nodes visible — those without known HQ float freely
                        return true;
                    }
                })
                .map(node => {
                    const isHyperedge = node.data.is_hyperedge || false;
                    const isTierHub = isHyperedge && node.data.type === 'tier_hyperedge';
                    const isCountryHub = isHyperedge && node.data.type === 'country_hyperedge';
                    const isCompany = node.type === 'company';
                    const tier = node.data.tier;

                    // Color: tier hubs use tierConfig, country hubs use embedded country color,
                    // companies always colored by tier
                    let color;
                    if (isTierHub) {
                        color = tierConfig[tier] ? tierConfig[tier].color : (node.data.color || '#bbb');
                    } else if (isCountryHub) {
                        color = node.data.color || '#9E9E9E';
                    } else {
                        color = isCompany && tier !== undefined && tierConfig[tier]
                            ? tierConfig[tier].color
                            : (node.data.color || '#bbb');
                    }

                    let label;
                    if (isTierHub) {
                        const tierKey = isNaN(tier) ? tier : Number(tier);
                        const cfgName = tierConfig[tierKey] ? tierConfig[tierKey].name : ('Tier ' + tier);
                        label = cfgName + (node.data.company_count ? '\n' + node.data.company_count + ' companies' : '');
                    } else if (isCountryHub) {
                        label = node.data.name + (node.data.company_count ? '\n' + node.data.company_count + ' companies' : '');
                    } else {
                        label = node.data.name || node.id;
                    }

                    return {
                        id: node.id,
                        label: label,
                        shape: isHyperedge ? 'diamond' : 'dot',
                        size: isTierHub ? 30 : isCountryHub ? 42 : Math.max(8, Math.min(22, (node.data.contexts || 1) / 25)),
                        color: {
                            background: color,
                            border: color,
                            highlight: { background: color, border: '#111' },
                            hover: { background: color, border: '#555' }
                        },
                        font: {
                            size: isTierHub ? 12 : isCountryHub ? 13 : 10,
                            color: '#111',
                            face: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                            strokeWidth: isHyperedge ? 4 : 2,
                            strokeColor: '#fff',
                            multi: false,
                        },
                        borderWidth: isHyperedge ? 2 : 1,
                        x: node.position.x,
                        y: node.position.y,
                        fixed: false,
                        _data: node.data
                    };
                });

            const activeNodeIds = new Set(allNodes.map(n => n.id));

            allEdges = vyuhData.connections
                .filter(conn => {
                    // Always hide continent connections and country-country semantic links
                    if (conn.type === 'country_semantic_relationship') return false;
                    if (conn.type === 'company_to_continent') return false;

                    if (isTierMode) {
                        // Tier mode: hide country edges
                        if (conn.type === 'company_to_country') return false;
                    } else {
                        // Country mode: only company-to-country edges, no tier edges, no Unknown blob
                        if (conn.type !== 'company_to_country') return false;
                        if (conn.target === 'hyperedge_country_Unknown') return false;
                        if (conn.source === 'hyperedge_country_Unknown') return false;
                    }

                    return activeNodeIds.has(conn.source) && activeNodeIds.has(conn.target);
                })
                .map(conn => ({
                    id: conn.id,
                    from: conn.source,
                    to: conn.target,
                    color: {
                        color: conn.data.color ? conn.data.color + '44' : '#ddd',
                        highlight: conn.data.color || '#999',
                        hover: conn.data.color || '#999'
                    },
                    width: conn.data.width || 1,
                    dashes: conn.data.dashed || false,
                    smooth: { type: 'continuous', roundness: 0.3 }
                }));

            const container = document.getElementById('graph-container');
            const data = {
                nodes: new vis.DataSet(allNodes),
                edges: new vis.DataSet(allEdges)
            };

            const options = {
                nodes: { borderWidth: 1, shadow: false },
                edges: {
                    arrows: { to: { enabled: false } },
                    smooth: { type: 'continuous' }
                },
                physics: {
                    enabled: true,
                    stabilization: { iterations: 300, fit: true },
                    barnesHut: {
                        gravitationalConstant: -3500,
                        centralGravity: 0.15,
                        springLength: 200,
                        springConstant: 0.03,
                        damping: 0.12,
                        avoidOverlap: 0.3
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    dragView: true,
                    hideEdgesOnDrag: true,
                    hideEdgesOnZoom: true
                }
            };

            network = new vis.Network(container, data, options);

            // Auto-freeze after stabilization, update button state
            network.on('stabilized', () => {
                physicsEnabled = false;
                network.setOptions({ physics: { enabled: false } });
                const btn = document.getElementById('physicsBtn');
                btn.textContent = '⚡ Physics: Off';
                btn.className = 'hdr-btn physics-btn-off';
            });

            // Click handler
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const node = allNodes.find(n => n.id === nodeId);
                    if (node && node._data) {
                        showDetail(node);
                        highlightConnected(nodeId, data);
                    }
                } else {
                    closeDetail();
                    resetHighlight(data);
                }
            });
        }

        // Show detail panel
        function showDetail(node) {
            const d = node._data;
            document.getElementById('detailName').textContent = d.name || node.id;

            const tier = d.tier !== undefined ? d.tier : '—';
            const tierColor = tierConfig[d.tier] ? tierConfig[d.tier].color : '#999';
            const country = d.country && d.country !== 'Unknown' ? d.country : '—';
            const type = d.is_hyperedge ? 'Hub' : 'Company';

            document.getElementById('detailMeta').innerHTML = `
                <span class="detail-badge" style="background:${tierColor}22;color:${tierColor};border:1px solid ${tierColor}44;">Tier ${tier}</span>
                <span class="detail-badge" style="background:#f0f0f0;color:#555;">${country}</span>
                <span class="detail-badge" style="background:#f0f0f0;color:#555;">${type}</span>
            `;

            const stats = document.getElementById('detailStats');
            stats.innerHTML = d.is_hyperedge
                ? `<div class="detail-stat"><div class="value">${d.company_count || '—'}</div><div class="label">Companies</div></div>
                   <div class="detail-stat"><div class="value">Tier ${tier}</div><div class="label">Level</div></div>`
                : `<div class="detail-stat"><div class="value">${d.contexts || '—'}</div><div class="label">Contexts</div></div>
                   <div class="detail-stat"><div class="value">${d.original_id || '—'}</div><div class="label">ID</div></div>`;

            document.getElementById('detailPanel').classList.add('visible');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('visible');
        }

        function highlightConnected(nodeId, data) {
            const connectedSet = new Set([nodeId, ...network.getConnectedNodes(nodeId)]);
            data.nodes.forEach(n => data.nodes.update({ id: n.id, opacity: connectedSet.has(n.id) ? 1.0 : 0.12 }));
        }

        function resetHighlight(data) {
            data.nodes.forEach(n => data.nodes.update({ id: n.id, opacity: 1.0 }));
        }

        function toggleTier(tier, element) {
            if (activeTiers.has(tier)) { activeTiers.delete(tier); element.classList.add('disabled'); }
            else { activeTiers.add(tier); element.classList.remove('disabled'); }
            buildGraph();
        }

        function resetFilters() {
            activeTiers = new Set(Object.keys(tierConfig).map(Number));
            document.querySelectorAll('.tier-filter').forEach(el => el.classList.remove('disabled'));
            buildGraph();
        }

        function fitGraph() {
            if (network) network.fit({ animation: { duration: 500 } });
        }

        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;

            // Update segmented toggle button states
            document.getElementById('tierModeBtn').classList.toggle('active', mode === 'tier');
            document.getElementById('countryModeBtn').classList.toggle('active', mode === 'country');

            // Re-enable physics so companies animate to new hub positions
            physicsEnabled = true;
            const btn = document.getElementById('physicsBtn');
            btn.textContent = '⚡ Physics: On';
            btn.className = 'hdr-btn physics-btn-on';

            buildGraph();
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (network) network.setOptions({ physics: { enabled: physicsEnabled } });
            const btn = document.getElementById('physicsBtn');
            if (physicsEnabled) {
                btn.textContent = '⚡ Physics: On';
                btn.className = 'hdr-btn physics-btn-on';
            } else {
                btn.textContent = '⚡ Physics: Off';
                btn.className = 'hdr-btn physics-btn-off';
            }
        }

        // Search
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            if (query.length < 2) {
                searchResults.classList.remove('visible');
                searchResults.innerHTML = '';
                return;
            }
            const matches = companyNodes
                .filter(n => n.data.name && n.data.name.toLowerCase().includes(query))
                .slice(0, 10);
            if (matches.length === 0) { searchResults.classList.remove('visible'); return; }

            searchResults.innerHTML = matches.map(n => {
                const color = tierConfig[n.data.tier] ? tierConfig[n.data.tier].color : '#999';
                return `<div class="search-result-item" data-id="${n.id}">
                    <span class="search-result-dot" style="background:${color}"></span>${n.data.name}
                </div>`;
            }).join('');

            searchResults.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const nodeId = item.dataset.id;
                    if (network) {
                        network.focus(nodeId, { scale: 1.5, animation: { duration: 500 } });
                        network.selectNodes([nodeId]);
                        const node = allNodes.find(n => n.id === nodeId);
                        if (node) showDetail(node);
                    }
                    searchResults.classList.remove('visible');
                    searchInput.value = '';
                });
            });
            searchResults.classList.add('visible');
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.search-box')) searchResults.classList.remove('visible');
        });

        // Init
        buildGraph();
    </script>
</body>
</html>
