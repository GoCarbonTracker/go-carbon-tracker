<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoCarbonTracker — Company Relationships Network</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            min-width: 260px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid #e5e5e5;
        }
        .sidebar-header h1 {
            font-size: 15px;
            font-weight: 700;
            color: #111;
            line-height: 1.3;
        }
        .sidebar-header p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e5e5;
        }
        .search-box input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background: #fafafa;
        }
        .search-box input:focus { border-color: #999; background: #fff; }
        .search-box input::placeholder { color: #bbb; }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            margin-top: 8px;
            display: none;
        }
        .search-results.visible { display: block; }
        .search-result-item {
            padding: 6px 4px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 3px;
        }
        .search-result-item:hover { background: #f0f0f0; }
        .search-result-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .stats-section {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e5e5;
        }
        .stats-section h3 {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #999;
            margin-bottom: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .stat-item {
            padding: 6px 8px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .stat-item .value {
            font-size: 18px;
            font-weight: 700;
            color: #111;
        }
        .stat-item .label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-section {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e5e5;
        }
        .filter-section h3 {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #999;
            margin-bottom: 8px;
        }
        .rel-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            cursor: pointer;
            font-size: 13px;
            user-select: none;
        }
        .rel-filter:hover { opacity: 0.8; }
        .rel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .rel-label { flex: 1; color: #333; }
        .rel-count { font-size: 11px; color: #999; font-variant-numeric: tabular-nums; }
        .rel-filter.disabled .rel-dot { opacity: 0.2; }
        .rel-filter.disabled .rel-label { color: #ccc; text-decoration: line-through; }
        .rel-filter.disabled .rel-count { color: #ddd; }
        .controls-section {
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
        }
        .controls-section button {
            width: 100%;
            padding: 7px 10px;
            margin-bottom: 6px;
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        .controls-section button:hover { background: #eee; border-color: #ccc; }
        .controls-section button:last-child { margin-bottom: 0; }
        .branding {
            padding: 10px 16px;
            border-top: 1px solid #e5e5e5;
        }
        .branding span { font-size: 11px; color: #999; }
        .graph-area { flex: 1; position: relative; }
        #graph-container { width: 100%; height: 100%; background: #fafafa; }
        .detail-panel {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 280px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 16px;
            display: none;
            z-index: 10;
        }
        .detail-panel.visible { display: block; }
        .detail-panel .close-btn {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; font-size: 16px;
            cursor: pointer; color: #999; padding: 4px; width: auto; margin: 0;
        }
        .detail-panel .close-btn:hover { color: #333; }
        .detail-name { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 4px; padding-right: 24px; }
        .detail-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .detail-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600;
        }
        .detail-connections { margin-top: 8px; }
        .detail-connections h4 { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; }
        .detail-conn-item { font-size: 12px; padding: 3px 0; color: #444; }
        .detail-conn-type { font-size: 10px; color: #999; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Company Relationships<br>Network</h1>
            <p>GoCarbonTracker — Supply chain partnerships and commitments</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search companies..." />
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="stats-section">
            <h3>Overview</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="value" id="companyCount">0</div>
                    <div class="label">Companies</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="connectionCount">0</div>
                    <div class="label">Connections</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="supplierCount">0</div>
                    <div class="label">Supplier Links</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="partnerCount">0</div>
                    <div class="label">Partnerships</div>
                </div>
            </div>
        </div>

        <div class="filter-section">
            <h3>Relationship Types</h3>
            <div id="relFilters"></div>
        </div>

        <div class="filter-section">
            <h3>Tiers</h3>
            <div id="tierFilters"></div>
        </div>

        <div class="controls-section">
            <button onclick="fitGraph()">Fit to View</button>
            <button onclick="togglePhysics()" id="physicsBtn">Physics: On</button>
            <button onclick="resetFilters()">Reset All</button>
        </div>

        <div class="branding">
            <span>GoCarbonTracker</span>
        </div>
    </div>

    <div class="graph-area">
        <div id="graph-container"></div>
        <div class="detail-panel" id="detailPanel">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <div class="detail-name" id="detailName"></div>
            <div class="detail-meta" id="detailMeta"></div>
            <div class="detail-connections" id="detailConnections"></div>
        </div>
    </div>

                document.getElementById('physicsBtn').textContent = 'Physics: Off';
            });

            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const node = filteredNodes.find(n => n.id === nodeId);
                    if (node) {
                        showDetail(node, data);
                        highlightConnected(nodeId, data);
                    }
                } else {
                    closeDetail();
                    resetHighlight(data);
                }
            });
        }

        function showDetail(node, data) {
            const d = node._data;
            const panel = document.getElementById('detailPanel');
            document.getElementById('detailName').textContent = d.name || node.id;

            const tierColor = tierConfig[d.tier] ? tierConfig[d.tier].color : '#999';
            const type = node._type === 'tier_hub' ? 'Tier Hub' : (node._type === 'commitment_hub' ? 'Commitment Hub' : 'Company');

            document.getElementById('detailMeta').innerHTML = `
                <span class="detail-badge" style="background: ${tierColor}22; color: ${tierColor}; border: 1px solid ${tierColor}44;">${d.tier || '—'}</span>
                <span class="detail-badge" style="background: #f0f0f0; color: #555;">${type}</span>
            `;

            // Show connected relationships
            const connectedEdges = network.getConnectedEdges(node.id);
            const connectedNodes = network.getConnectedNodes(node.id);
            const connHtml = connectedNodes.map(cId => {
                const cNode = allNodes.find(n => n.id === cId);
                if (!cNode) return '';
                const edge = data.edges.get(connectedEdges.find(eId => {
                    const e = data.edges.get(eId);
                    return e && (e.from === cId || e.to === cId);
                }));
                const relType = edge ? (relConfig[edge._type] || {}).name || '' : '';
                return `<div class="detail-conn-item">${cNode.label} <span class="detail-conn-type">${relType}</span></div>`;
            }).filter(Boolean).join('');

            document.getElementById('detailConnections').innerHTML = connectedNodes.length > 0
                ? `<h4>Connected (${connectedNodes.length})</h4>${connHtml}`
                : '<h4>No direct relationships</h4>';

            panel.classList.add('visible');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('visible');
        }

        function highlightConnected(nodeId, data) {
            const connectedNodes = network.getConnectedNodes(nodeId);
            const connectedSet = new Set([nodeId, ...connectedNodes]);
            data.nodes.forEach(node => {
                data.nodes.update({ id: node.id, opacity: connectedSet.has(node.id) ? 1.0 : 0.15 });
            });
        }

        function resetHighlight(data) {
            data.nodes.forEach(node => {
                data.nodes.update({ id: node.id, opacity: 1.0 });
            });
        }

        function fitGraph() { if (network) network.fit({ animation: { duration: 500 } }); }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (network) network.setOptions({ physics: { enabled: physicsEnabled } });
            document.getElementById('physicsBtn').textContent = physicsEnabled ? 'Physics: On' : 'Physics: Off';
        }

        function resetFilters() {
            activeTiers = new Set(Object.keys(tierConfig));
            activeRels = new Set(Object.keys(relConfig));
            document.querySelectorAll('.rel-filter').forEach(el => el.classList.remove('disabled'));
            buildGraph();
        }

        // Search
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            if (query.length < 2) { searchResults.classList.remove('visible'); searchResults.innerHTML = ''; return; }

            const matches = companyNodes
                .filter(n => n.data.name && n.data.name.toLowerCase().includes(query))
                .slice(0, 10);

            if (matches.length === 0) { searchResults.classList.remove('visible'); return; }

            searchResults.innerHTML = matches.map(n => {
                const color = tierConfig[n.data.tier] ? tierConfig[n.data.tier].color : '#999';
                return `<div class="search-result-item" data-id="${n.id}">
                    <span class="search-result-dot" style="background: ${color}"></span>
                    ${n.data.name}
                </div>`;
            }).join('');

            searchResults.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const nodeId = item.dataset.id;
                    if (network) {
                        network.focus(nodeId, { scale: 1.5, animation: { duration: 500 } });
                        network.selectNodes([nodeId]);
                        const node = allNodes.find(n => n.id === nodeId);
                        if (node) showDetail(node, { nodes: network.body.data.nodes, edges: network.body.data.edges });
                    }
                    searchResults.classList.remove('visible');
                    searchInput.value = '';
                });
            });
            searchResults.classList.add('visible');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) searchResults.classList.remove('visible');
        });

        buildGraph();
    </script>
</body>
</html>
