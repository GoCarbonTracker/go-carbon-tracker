<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Automotive Supply Chain</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        #network {
            width: 100%;
            height: 100vh;
            background: white;
            border: 1px solid #e0e0e0;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 100;
        }
        #network {
            margin-left: 320px;
        }
        .header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 22px;
        }
        .header p {
            margin: 5px 0;
            font-size: 12px;
            opacity: 0.9;
        }
        .stats {
            padding: 15px 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #e0e0e0;
        }
        .stat {
            margin-bottom: 10px;
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .legend {
            padding: 15px 20px;
        }
        .legend-title {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .legend-item {
            margin-bottom: 8px;
            font-size: 12px;
        }
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        .controls {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">
            <h1>Automotive Supply Chain</h1>
            <p>OEM → Tier 1 → Tier 2 → Tier 3 supply chain relationships</p>
            <p>Domain: <strong>automotive</strong></p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Nodes</div>
                <div class="stat-value">8</div>
            </div>
            <div class="stat">
                <div class="stat-label">Connections</div>
                <div class="stat-value">6</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-title">Node Types</div>
            <div class="legend-item"><span class="legend-color" style="background: #FF0000"></span>OEM</div><div class="legend-item"><span class="legend-color" style="background: #FFA500"></span>Tier1</div><div class="legend-item"><span class="legend-color" style="background: #00AA00"></span>Tier2</div>
        </div>

        <div class="controls">
            <button onclick="resetPhysics()">Reset Layout</button>
            <button onclick="fitNetwork()">Fit to Screen</button>
            <button onclick="centerNetwork()">Center Network</button>
        </div>

        <div style="padding: 15px 20px; font-size: 11px; color: #999;">
            <p><strong>Controls:</strong></p>
            <ul style="margin: 5px 0; padding-left: 20px;">
                <li>Drag to move nodes</li>
                <li>Scroll to zoom</li>
                <li>Click node for details</li>
            </ul>
        </div>
    </div>

    <div id="network"></div>

    <script>
        var nodesData = new vis.DataSet([{"id": "bmw", "type": "OEM", "name": "BMW", "shape": "circle", "position": {"x": 0, "y": 0}, "color": "#FF0000", "metadata": {}}, {"id": "volvo", "type": "OEM", "name": "Volvo", "shape": "circle", "position": {"x": 200, "y": 0}, "color": "#FF0000", "metadata": {}}, {"id": "stellantis", "type": "OEM", "name": "Stellantis", "shape": "circle", "position": {"x": 400, "y": 0}, "color": "#FF0000", "metadata": {}}, {"id": "bosch", "type": "Tier1", "name": "Bosch", "shape": "circle", "position": {"x": 600, "y": 0}, "color": "#FFA500", "metadata": {}}, {"id": "continental", "type": "Tier1", "name": "Continental", "shape": "circle", "position": {"x": 800, "y": 0}, "color": "#FFA500", "metadata": {}}, {"id": "brembo", "type": "Tier1", "name": "Brembo", "shape": "circle", "position": {"x": 0, "y": 200}, "color": "#FFA500", "metadata": {}}, {"id": "catl", "type": "Tier2", "name": "CATL", "shape": "circle", "position": {"x": 200, "y": 200}, "color": "#00AA00", "metadata": {}}, {"id": "northvolt", "type": "Tier2", "name": "Northvolt", "shape": "circle", "position": {"x": 400, "y": 200}, "color": "#00AA00", "metadata": {}}]);
        var edgesData = new vis.DataSet([{"id": "conn_0", "source": "bmw", "target": "bosch", "type": "supplier_link", "label": "buys from", "style": "solid", "color": "#FF0000"}, {"id": "conn_1", "source": "bmw", "target": "catl", "type": "supplier_link", "label": "buys batteries", "style": "solid", "color": "#FF0000"}, {"id": "conn_2", "source": "volvo", "target": "brembo", "type": "supplier_link", "label": "buys brakes", "style": "solid", "color": "#FF0000"}, {"id": "conn_3", "source": "volvo", "target": "northvolt", "type": "supplier_link", "label": "buys batteries", "style": "solid", "color": "#FF0000"}, {"id": "conn_4", "source": "bosch", "target": "catl", "type": "supplier_link", "label": "uses components", "style": "solid", "color": "#FF0000"}, {"id": "conn_5", "source": "bmw", "target": "volvo", "type": "technology_partner", "label": "tech partnership", "style": "dashed", "color": "#9900FF"}]);
        var container = document.getElementById('network');

        var data = {
            nodes: nodesData,
            edges: edgesData
        };

        var options = {
            physics: {
                enabled: true,
                stabilization: {
                    iterations: 200,
                    fit: true,
                    updateInterval: 50
                },
                barnesHut: {
                    gravitationalConstant: -26000,
                    centralGravity: 0.3,
                    springLength: 200,
                    springConstant: 0.04
                },
                wind: { x: 0, y: 0 },
                minVelocity: 0.75,
                solver: 'barnesHut'
            },
            interaction: {
                navigationButtons: true,
                keyboard: true,
                zoomView: true,
                dragView: true
            },
            layout: {
                randomSeed: 42
            }
        };

        var network = new vis.Network(container, data, options);

        function resetPhysics() {
            network.physics.startSimulation();
        }

        function fitNetwork() {
            network.fit({ animation: true });
        }

        function centerNetwork() {
            network.setOptions({ physics: false });
            var pos = network.getPositions();
            var allNodes = Object.keys(pos);
            network.focus(allNodes[0], { scale: 0.8, animation: true });
        }

        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                var node = nodesData.get(nodeId);
                console.log('Selected node:', node);
                alert('Node: ' + node.name + '\nType: ' + node.type);
            }
        });
    </script>
</body>
</html>
